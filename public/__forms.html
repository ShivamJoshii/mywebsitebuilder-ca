<html>
<body>
  <!-- Netlify Forms registration -->
  <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact" />
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="business" />
    <input name="service" />
    <textarea name="message"></textarea>
  </form>

  <!-- Website Application Form -->
  <form name="website-application" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="website-application" />
    <input name="bot-field" />
    <input name="businessName" />
    <input name="industry" />
    <textarea name="description"></textarea>
    <input name="hasDomain" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
  </form>
</body>
</html>
